<!DOCTYPE html>
<html>
<head>
    <title>Coffee Shop</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            padding: 2rem;
            margin: 0;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            color: #6f4e37;
            margin-top: 0;
        }
        .btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: #6f4e37;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            margin: 0.5rem 0.5rem 0.5rem 0;
            font-weight: 500;
            transition: background 0.2s ease;
        }
        .btn:hover {
            background: #5a3e2d;
        }
        .tagline {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☕ Willkommen im Coffee Shop</h1>
        <p class="tagline">Frisch gebrühter Kaffee & gemütliche Atmosphäre.</p>
        <a class="btn" href="/menu/">Menü ansehen</a>
        <a class="btn" href="/kontakt/">Kontakt</a>
    </div>
</body>
</html>
