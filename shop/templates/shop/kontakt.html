<!DOCTYPE html>
<html>
<head>
    <title>Kontakt – Coffee Shop</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            padding: 2rem;
            margin: 0;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            color: #6f4e37;
            margin-top: 0;
        }
        .back {
            display: inline-block;
            margin-bottom: 1rem;
            color: #6f4e37;
            text-decoration: none;
            font-weight: 500;
        }
        .back:hover {
            text-decoration: underline;
        }
        .contact-info {
            line-height: 1.6;
        }
        a.mail {
            color: #6f4e37;
            text-decoration: none;
        }
        a.mail:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" href="/">← Zurück</a>
        <h1>Kontakt</h1>
        <div class="contact-info">
            <p>Coffee Shop GmbH<br>
            Musterstraße 1<br>
            12345 Musterstadt</p>
            <p>Tel: +49 123 456789<br>
            E-Mail: <a class="mail" href="mailto:info@coffeeshop.example">info@coffeeshop.example</a></p>
            <p>Öffnungszeiten:<br>
            Mo–Fr: 07:00–19:00 Uhr<br>
            Sa: 08:00–18:00 Uhr<br>
            So: 09:00–17:00 Uhr</p>
        </div>
    </div>
</body>
</html>
