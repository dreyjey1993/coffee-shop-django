<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Coffee Shop{% endblock %}</title>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            flex: 1 0 auto;
        }
        h1 {
            color: #6f4e37;
            margin-top: 0;
        }
        .btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: #6f4e37;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            margin: 0.5rem 0.5rem 0.5rem 0;
            font-weight: 500;
            transition: background 0.2s ease;
        }
        .btn:hover {
            background: #5a3e2d;
        }
        .back {
            display: inline-block;
            margin-bottom: 1rem;
            color: #6f4e37;
            text-decoration: none;
            font-weight: 500;
        }
        .back:hover {
            text-decoration: underline;
        }
        .menu-item {
            margin-bottom: 1rem;
            padding: 1rem;
            border: 1px solid #eaeaea;
            border-radius: 8px;
            background: #fafafa;
        }
        .menu-item h3 {
            margin: 0 0 0.3rem 0;
            color: #444;
        }
        .menu-item p {
            margin: 0;
            color: #666;
        }
        .tagline {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 1.5rem;
        }
        footer {
            text-align: center;
            padding: 1rem;
            color: #888;
            font-size: 0.9rem;
            background: #f0f0f0;
            border-top: 1px solid #ddd;
        }
        footer a {
            color: #6f4e37;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer>
        &copy; {% now "Y" %} Coffee Shop GmbH &mdash; Made with <span style="color:#e25555;">&hearts;</span> and caffeine
    </footer>
</body>
</html>
