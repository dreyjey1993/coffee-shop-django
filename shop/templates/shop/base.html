<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Coffee Shop{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --coffee-brown: #6f4e37;
            --coffee-light: #a67c52;
            --bg-light: #f8f9fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-light);
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            background: var(--coffee-brown) !important;
        }
        .navbar-brand, .nav-link {
            color: #fff !important;
        }
        .nav-link:hover {
            color: rgba(255,255,255,0.85) !important;
        }
        .hero {
            background: linear-gradient(rgba(111, 78, 55, 0.85), rgba(111, 78, 55, 0.85)), url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=1400&q=80');
            background-size: cover;
            background-position: center;
            color: #fff;
            padding: 4rem 1rem;
            text-align: center;
            margin-bottom: 2rem;
            border-radius: 0 0 16px 16px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            flex: 1 0 auto;
        }
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }
        .price {
            color: var(--coffee-brown);
            font-weight: 600;
            font-size: 1.1rem;
        }
        footer {
            text-align: center;
            padding: 1.5rem;
            color: #888;
            font-size: 0.9rem;
            background: #e9ecef;
            border-top: 1px solid #dee2e6;
            margin-top: auto;
        }
        footer a {
            color: var(--coffee-brown);
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">☕ Coffee Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Start</a></li>
                    <li class="nav-item"><a class="nav-link" href="/menu/">Menü</a></li>
                    <li class="nav-item"><a class="nav-link" href="/kontakt/">Kontakt</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/">Admin</a></li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer>
        <div class="container">
            &copy; {% now "Y" %} Coffee Shop GmbH — Made with <span style="color:#e25555;">&hearts;</span> and caffeine
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
