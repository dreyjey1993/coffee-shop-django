<!DOCTYPE html>
<html>
<head>
    <title>Menü – Coffee Shop</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            padding: 2rem;
            margin: 0;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            color: #6f4e37;
            margin-top: 0;
        }
        .back {
            display: inline-block;
            margin-bottom: 1rem;
            color: #6f4e37;
            text-decoration: none;
            font-weight: 500;
        }
        .back:hover {
            text-decoration: underline;
        }
        .menu-item {
            margin-bottom: 1rem;
            padding: 1rem;
            border: 1px solid #eaeaea;
            border-radius: 8px;
            background: #fafafa;
        }
        .menu-item h3 {
            margin: 0 0 0.3rem 0;
            color: #444;
        }
        .menu-item p {
            margin: 0;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" href="/">← Zurück</a>
        <h1>Kaffee-Menü</h1>

        <div class="menu-item">
            <h3>Espresso</h3>
            <p>Kräftig, aromatisch – 2,50 €</p>
        </div>

        <div class="menu-item">
            <h3>Cappuccino</h3>
            <p>Milchschaum, Zimt – 3,50 €</p>
        </div>

        <div class="menu-item">
            <h3>Latte Macchiato</h3>
            <p>Viel Milch, wenig Kaffee – 4,00 €</p>
        </div>

        <div class="menu-item">
            <h3>Kalter Auszieher (Cold Brew)</h3>
            <p>12 Stunden gezogen – 4,50 €</p>
        </div>
    </div>
</body>
</html>
